# Static site — no build step.
[build]
  publish = "."

# Long-cache the fingerprint-free image assets; safe because filenames change when content does.
[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
